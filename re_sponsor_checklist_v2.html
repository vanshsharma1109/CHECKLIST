    {n:"Titan Watches", t:"in", why:"Premium Indian watch brand"},
    {n:"Puma India", t:"gl", why:"Sportswear & lifestyle brand"},
    {n:"Nike India", t:"gl", why:"Premium global sportswear"},
    {n:"Adidas India", t:"gl", why:"Sport & lifestyle apparel"},
    {n:"Levi's India", t:"gl", why:"Denim lifestyle brand — RE rider culture"},
    {n:"Wrangler India", t:"gl", why:"Rugged denim & outdoor wear"},
    {n:"Flying Machine", t:"in", why:"Indian youth denim brand"},
    {n:"Skullcandy India", t:"gl", why:"Audio brand — youth & adventure"},
    {n:"Fossil India", t:"gl", why:"Lifestyle watches & accessories"},
  ]
}
];

function render(){
  const q=(document.getElementById('srch')||{value:''}).value.toLowerCase().trim();
  const wrap=document.getElementById('wrap');
  wrap.innerHTML='';
  let tot=0,sel=0,cats=0;
  CATS.forEach(cat=>{
    const brands=cat.brands.filter(b=>!q||b.n.toLowerCase().includes(q)||cat.label.toLowerCase().includes(q));
    if(!brands.length)return;
    cats++;
    const sc=brands.filter(b=>SEL[b.n]).length;
    tot+=brands.length; sel+=sc;
    const pct=brands.length?Math.round(sc/brands.length*100):0;
    const open=q.length>0;
    const div=document.createElement('div');
    div.className='section'+(cat.confirmed?' confirmed':'');
    div.innerHTML=`
      <div class="sec-hd" onclick="toggle(this)">
        <div class="sec-icon">${cat.icon}</div>
        <div style="flex:1;min-width:0">
          <div class="sec-label">${cat.label}</div>
          <div class="sec-sub">${cat.sub}</div>
        </div>
        <span class="badge">${sc}/${brands.length}</span>
        <div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div>
        <span class="chev${open?' open':''}">&#9654;</span>
      </div>
      <div class="sec-body${open?' open':''}">
        ${brands.map((b,i)=>`
          ${i>0&&b.hot&&!brands[i-1].hot?'<div class="divider"></div>':''}
          <div class="brand${SEL[b.n]?' ticked':''}" onclick="tick(${JSON.stringify(b.n)},this)">
            <input type="checkbox"${SEL[b.n]?' checked':''} onclick="event.stopPropagation();tick(${JSON.stringify(b.n)},this.closest('.brand'))">
            <span class="brand-name">${b.n}</span>
            <span class="why">${b.why}</span>
            <span class="pill ${b.t}">${b.t==='in'?'Indian':'Global'}</span>
            ${b.hot?'<span class="pill hot">★ top pick</span>':''}
          </div>`).join('')}
      </div>`;
    wrap.appendChild(div);
  });
  document.getElementById('sTot').textContent=tot;
  document.getElementById('sSel').textContent=sel;
  document.getElementById('sCat').textContent=cats;
}
function toggle(hd){
  const body=hd.nextElementSibling;
  const chev=hd.querySelector('.chev');
  const isOpen=body.classList.toggle('open');
  chev.classList.toggle('open',isOpen);
}
function tick(name,row){
  SEL[name]=!SEL[name];
  row.classList.toggle('ticked',SEL[name]);
  row.querySelector('input').checked=SEL[name];
  const body=row.closest('.sec-body');
  const hd=body.previousElementSibling;
  const rows=body.querySelectorAll('.brand');
  const n=[...rows].filter(r=>r.classList.contains('ticked')).length;
  hd.querySelector('.badge').textContent=`${n}/${rows.length}`;
  hd.querySelector('.prog-fill').style.width=Math.round(n/rows.length*100)+'%';
  document.getElementById('sSel').textContent=Object.values(SEL).filter(Boolean).length;
}
function expandAll(){document.querySelectorAll('.sec-body').forEach(b=>b.classList.add('open'));document.querySelectorAll('.chev').forEach(c=>c.classList.add('open'))}
function collapseAll(){document.querySelectorAll('.sec-body').forEach(b=>b.classList.remove('open'));document.querySelectorAll('.chev').forEach(c=>c.classList.remove('open'))}
function clearAll(){Object.keys(SEL).forEach(k=>delete SEL[k]);render()}
function doFilter(){render()}
function doExport(){
  const lines=['ROYAL ENFIELD — SPONSORSHIP SHORTLIST\n','Generated: '+new Date().toLocaleDateString('en-IN')];
  let any=false;
  CATS.forEach(cat=>{
    const sel=cat.brands.filter(b=>SEL[b.n]);
    if(sel.length){
      any=true;
      lines.push(`\n\n━━ ${cat.label.toUpperCase()} ━━`);
      sel.forEach(b=>lines.push(`  ✓  ${b.n}  [${b.t==='in'?'Indian':'Global'}]  — ${b.why}`));
    }
  });
  if(!any){alert('Select some brands first!');return;}
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/plain'}));
  a.download='RE_Sponsor_Shortlist.txt';a.click();
}
render();
</script>
